name: Build e Deploy no Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: drgustavomartins-projects
      VERCEL_PROJECT_ID: ampla-portal
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build
        run: npm run build

      - name: Configurar variáveis de ambiente no Vercel
        run: |
          set_env_var() {
            local KEY=$1
            local VALUE=$2
            # Deletar se existir
            curl -s -X DELETE \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env/${KEY}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null 2>&1 || true
            # Criar nova
            RESPONSE=$(curl -s -X POST \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"${KEY}\",\"value\":\"${VALUE}\",\"type\":\"encrypted\",\"target\":[\"production\"]}")
            echo "${KEY}: $(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK: '+d.get('key','')) if 'key' in d else print('ERRO: '+d.get('error',{}).get('message',''))" 2>/dev/null || echo $RESPONSE)"
          }
          set_env_var "STRIPE_SECRET_KEY" "${{ secrets.STRIPE_SECRET_KEY }}"
          set_env_var "STRIPE_WEBHOOK_SECRET" "${{ secrets.STRIPE_WEBHOOK_SECRET }}"

      - name: Deploy no Vercel
        run: npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
